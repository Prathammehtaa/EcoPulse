name: Deploy Backend

on:
  push:
    branches:
      - main
    paths:
      - "api/**"
      - "Model_Pipeline/src/**"

env:
  PROJECT_ID: ecopulse-492814
  REGION: us-central1
  CLUSTER: ecopulse-gke
  IMAGE: us-central1-docker.pkg.dev/ecopulse-492814/ecopulse-images/backend

jobs:
  deploy:
    name: Build & Deploy Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.ECOPULSE_GITHUB_ACTIONS }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ env.IMAGE }}:${{ github.sha }} \
            -t ${{ env.IMAGE }}:latest \
            -f api/Dockerfile .

      - name: Push Docker image
        run: |
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.CLUSTER }}
          location: ${{ env.REGION }}

      - name: Deploy to GKE
        run: |
          kubectl set image deployment/backend \
            backend=${{ env.IMAGE }}:${{ github.sha }} \
            -n ecopulse
          kubectl rollout status deployment/backend -n ecopulse