          if-no-files-found: ignore
          retention-days: 30

# ================================================================
# JOB 3 — Hyperparameter Tuning  (manual dispatch only)
# ================================================================
  hyperparameter-tune:
    name: "Hyperparameter Tuning (Optuna)"
    runs-on: ubuntu-latest
    timeout-minutes: 180

    if: >
      github.event_name == 'workflow_dispatch' &&
      (inputs.model_type == 'tune' || inputs.run_tuning == true)

    env:
      GCP_SA_KEY_PRATHAM : ${{ secrets.GCP_SA_KEY_PRATHAM  }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: Model_Pipeline/requirements.txt

      - name: Install dependencies
        run: pip install -r Model_Pipeline/requirements.txt

      # ── 3. GCP authentication ────────────────────────────────
      - name: Authenticate to GCP
        id: auth
        if: env.GCP_SA_KEY_PRATHAM  != ''
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY_PRATHAM  }}

      - name: Set up gcloud CLI
        if: env.GCP_SA_KEY_PRATHAM  != ''
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Export GCP credentials for DVC
        if: env.GCP_SA_KEY_PRATHAM  != ''
        run: echo "GOOGLE_APPLICATION_CREDENTIALS=${{ steps.auth.outputs.credentials_file_path }}" >> $GITHUB_ENV

      # ── 4. Training data ────────────────────────────────────
      - name: Pull training data (DVC)
        run: |
          pip install gcsfs --quiet
          python3 << 'PYEOF'
          import gcsfs, os
          os.makedirs("Data_Pipeline/data/processed", exist_ok=True)
          fs = gcsfs.GCSFileSystem()
          for f in ["train_split.parquet", "val_split.parquet", "test_split.parquet"]:
              dest = f"Data_Pipeline/data/processed/{f}"
              if not os.path.exists(dest):
                  fs.get(f"ecopulse-aaditya-data/processed/{f}", dest)
                  print(f"Downloaded {f}")
              else:
                  print(f"Already exists: {f}")
          PYEOF


      - name: Verify training data
        run: |
          for f in \
            Data_Pipeline/data/processed/train_split.parquet \
            Data_Pipeline/data/processed/val_split.parquet \
            Data_Pipeline/data/processed/test_split.parquet; do
            [ -f "$f" ] || { echo "::error::Missing: $f"; exit 1; }
          done

      - name: Run Optuna hyperparameter search
        working-directory: ${{ env.MODEL_SRC }}
        run: |
          mkdir -p ../../reports
          python hyperparameter_tuning.py 2>&1 | tee ../../reports/tuning.log
          exit "${PIPESTATUS[0]}"

      - name: Upload tuned models
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: models-tuned
          path: Model_Pipeline/models/xgboost_tuned_*.joblib
          if-no-files-found: error
          retention-days: 30

      - name: Upload tuning artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports-tuning
          path: |
            Model_Pipeline/reports/tuned_xgboost_results.csv
            Model_Pipeline/reports/best_hyperparameters.csv
            Model_Pipeline/reports/tuning.log
          if-no-files-found: warn
          retention-days: 30

      - name: Upload MLflow tuning runs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mlruns-tuning
          path: Model_Pipeline/mlruns/
          if-no-files-found: ignore
          retention-days: 30

# ================================================================
# JOB 4 — Validate Models
# Runs SHAP, LIME, confusion matrices, sensitivity analysis.
# Fails the workflow if any horizon exceeds the MAE threshold.
# ================================================================
  validate-models:
    name: "Validate Models"
    needs: [train-xgboost, train-lightgbm]
    runs-on: ubuntu-latest
    timeout-minutes: 200

    # Run if at least one training job succeeded and validation not skipped
    if: >
      !cancelled() &&
      inputs.skip_validation != true &&
      (needs.train-xgboost.result  == 'success' ||
       needs.train-lightgbm.result == 'success')

    env:
      GCP_SA_KEY_PRATHAM : ${{ secrets.GCP_SA_KEY_PRATHAM  }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: Model_Pipeline/requirements.txt

      - name: Install dependencies
        run: pip install -r Model_Pipeline/requirements.txt

      # ── GCP authentication  ───
      - name: Authenticate to GCP
        id: auth
        if: env.GCP_SA_KEY_PRATHAM  != ''
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY_PRATHAM  }}

      - name: Export GCP credentials for DVC
        if: env.GCP_SA_KEY_PRATHAM  != ''
        run: echo "GOOGLE_APPLICATION_CREDENTIALS=${{ steps.auth.outputs.credentials_file_path }}" >> $GITHUB_ENV

      # ── Restore training data ───────────────────────────────
      - name: Pull training data (DVC)
        run: |
          pip install gcsfs --quiet
          python3 << 'PYEOF'
          import gcsfs, os
          os.makedirs("Data_Pipeline/data/processed", exist_ok=True)
          fs = gcsfs.GCSFileSystem()
          for f in ["train_split.parquet", "val_split.parquet", "test_split.parquet"]:
              dest = f"Data_Pipeline/data/processed/{f}"
              if not os.path.exists(dest):
                  fs.get(f"ecopulse-aaditya-data/processed/{f}", dest)
                  print(f"Downloaded {f}")
              else:
                  print(f"Already exists: {f}")
          PYEOF


      - name: Verify training data
        run: |
          for f in \
            Data_Pipeline/data/processed/train_split.parquet \
            Data_Pipeline/data/processed/val_split.parquet \
            Data_Pipeline/data/processed/test_split.parquet; do
            [ -f "$f" ] || { echo "::error::Missing: $f"; exit 1; }
          done

      # ── Restore trained models ──────────────────────────────
      - name: Download XGBoost models
        if: needs.train-xgboost.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: models-xgboost
          path: Model_Pipeline/models/

      - name: Download LightGBM models
        if: needs.train-lightgbm.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: models-lightgbm
          path: Model_Pipeline/models/

      - name: List available models
        run: |
          echo "Models available for validation:"
          ls -lh Model_Pipeline/models/*.joblib 2>/dev/null || echo "  (none found)"

      # ── Run validation ──────────────────────────────────────
      - name: Run model validation (SHAP / LIME / sensitivity)
        working-directory: ${{ env.MODEL_SRC }}
        run: |
          mkdir -p ../../reports/validation
          python model_validation.py 2>&1 | tee ../../reports/validation/validation.log
          exit "${PIPESTATUS[0]}"

      # ── Metric threshold gate ───────────────────────────────
      # Fail if any horizon's test MAE is worse than the naive baseline.
      # This catches regressions caused by data or code changes.
      - name: Check metric thresholds
        run: |
          python3 - << 'PYEOF'
          import json, sys, os

          report_path = "Model_Pipeline/reports/validation/validation_report.json"
          if not os.path.exists(report_path):
              print("::error::validation_report.json not found — validation did not complete")
              sys.exit(1)

          with open(report_path) as f:
              report = json.load(f)

          # Naive-baseline MAE per horizon (gCO2/kWh)
          # Models must beat baseline to pass.
          BASELINE_MAE = {"1h": 57.48, "6h": 71.33, "12h": 76.36, "24h": 68.79}

          print("\n" + "=" * 60)
          print("Metric Threshold Check (must beat naive baseline)")
          print("=" * 60)

          failures = []
          for horizon, baseline in BASELINE_MAE.items():
              if horizon not in report:
                  print(f"  {horizon}: ⚠️  not present in report — skipping")
                  continue
              mae = report[horizon]["metrics"]["test"]["mae"]
              impr = (baseline - mae) / baseline * 100
              status = "✅ PASS" if mae < baseline else "❌ FAIL"
              print(f"  {horizon}: MAE={mae:>6.2f}  baseline={baseline:.2f}  "
                    f"improvement={impr:+.1f}%  {status}")
              if mae >= baseline:
                  failures.append(f"{horizon} MAE={mae:.2f} (baseline={baseline:.2f})")

          print()
          if failures:
              for f in failures:
                  print(f"::error::Threshold exceeded — {f}")
              sys.exit(1)
          else:
              print("✅ All horizons beat the naive baseline")
          PYEOF

      # ── Run model comparison (only if both models available) ─
      - name: Run model comparison
        if: >
          needs.train-xgboost.result  == 'success' &&
          needs.train-lightgbm.result == 'success'
        working-directory: ${{ env.MODEL_SRC }}
        run: |
          python model_comparison.py 2>&1 | tee ../../reports/comparison.log || {
            echo "::warning::model_comparison.py failed — non-blocking"
          }

      # ── Upload validation artifacts ─────────────────────────
      - name: Upload validation reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports-validation
          path: |
            Model_Pipeline/reports/validation/
            Model_Pipeline/reports/model_comparison_*.png
            Model_Pipeline/reports/model_improvement.png
            Model_Pipeline/reports/full_comparison.csv
            Model_Pipeline/reports/comparison.log
          if-no-files-found: warn
          retention-days: 30

# ================================================================
# JOB 5 — Bias & Fairness Check
# Evaluates per-slice disparities across zones, seasons, weather.
# Fails if any slice shows a critical disparity (>50 % worse).
# ================================================================
  bias-check:
    name: "Bias & Fairness Check"
    needs: [train-xgboost, train-lightgbm]
    runs-on: ubuntu-latest
    timeout-minutes: 30

    if: >
      !cancelled() &&
      inputs.skip_validation != true &&
      (needs.train-xgboost.result  == 'success' ||
       needs.train-lightgbm.result == 'success')

    env:
      GCP_SA_KEY_PRATHAM : ${{ secrets.GCP_SA_KEY_PRATHAM  }}

