# ============================================================
# EcoPulse — Model Training & Validation Pipeline
# ============================================================
#
# Trigger matrix:
#   push → main (Model_Pipeline/src/**) → trains both models
#   workflow_dispatch                    → configurable (see inputs)
#   schedule (Mon 02:00 UTC)            → trains both models
#
# Job graph:
#
#   train-xgboost ──┐
#                   ├─► validate-models ──┐
#   train-lightgbm ─┤                     ├─► notify
#                   └─► bias-check ───────┘
#   hyperparameter-tune (manual only)  ───────────────────────┘
#
# Required secrets:
#   SLACK_WEBHOOK_URL     Incoming webhook for Slack notifications
#   GCP_SA_KEY_PRATHAM             GCP service-account key JSON (base64-encoded).
#                         Enables push to Artifact Registry (ecopulse-models).
#                         Without this secret the GCP push is skipped gracefully.
#
# Optional secrets:
#   DVC_REMOTE_URL        Remote storage URL for DVC data pull
#   MLFLOW_TRACKING_URI   Override the default local SQLite backend
# ============================================================

name: EcoPulse — Model Training & Validation

on:
  push:
    branches: [main]
    paths:
      - "Model_Pipeline/src/**.py"

  workflow_dispatch:
    inputs:
      model_type:
        description: "Model(s) to train"
        required: true
        default: "both"
        type: choice
        options:
          - xgboost    # XGBoost only
          - lightgbm   # LightGBM only
          - both       # Both models in parallel
          - tune       # Optuna hyperparameter search (no standard training)
      skip_validation:
        description: "Skip validation and bias checks (fast iteration mode)"
        required: false
        default: false
        type: boolean
      run_tuning:
        description: "Run Optuna hyperparameter tuning before training"
        required: false
        default: false
        type: boolean
      trigger:
        description: "Dispatch trigger source — 'manual' for a normal run, 'drift' for automated drift-triggered retraining"
        required: false
        default: "manual"
        type: string

  schedule:
    # Every Monday at 02:00 UTC — full training run
    - cron: "0 2 * * 1"
    # Every 6 hours — monitoring-only heartbeat (training jobs skip this cron)
    - cron: "0 */6 * * *"

# ── Cancel in-progress runs on the same branch for push events ──
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'push' }}

# ── Shared environment ──────────────────────────────────────────
env:
  PYTHON_VERSION: "3.11"
  MODEL_SRC: "Model_Pipeline/src"
  MODELS_DIR: "Model_Pipeline/models"
  REPORTS_DIR: "Model_Pipeline/reports"
  # Default to local SQLite; overridden by secret if set
  MLFLOW_TRACKING_URI: >-
    ${{ secrets.MLFLOW_TRACKING_URI ||
        format('sqlite:///{0}/Model_Pipeline/mlruns/mlflow.db', github.workspace) }}
  # GCP Artifact Registry — push models after training (requires GCP_SA_KEY_PRATHAM  secret)
  GCP_PUSH_MODELS: "1"
  GCP_PROJECT_ID: "ecopulse-mlops-pratham"
  GCP_REGISTRY_LOCATION: "us-central1"
  GCP_REGISTRY_REPO: "ecopulse-models"

defaults:
  run:
    shell: bash

# ================================================================
# JOB 1 — Train XGBoost
# ================================================================
jobs:
  train-xgboost:
    name: "Train XGBoost"
    needs: [hyperparameter-tune]
    runs-on: ubuntu-latest
    timeout-minutes: 90

    if: >
      always() &&
      github.event.schedule != '0 */6 * * *' &&
      (needs.hyperparameter-tune.result == 'success' || needs.hyperparameter-tune.result == 'skipped') &&
      (github.event_name != 'workflow_dispatch' ||
       inputs.model_type == 'xgboost' ||
       inputs.model_type == 'both')

    # Secrets cannot be read in `if` conditions — expose as env vars instead
    # so step-level `if: env.VAR != ''` works correctly.
    env:
      GCP_SA_KEY_PRATHAM : ${{ secrets.GCP_SA_KEY_PRATHAM  }}

    steps:
      # ── 1. Source code ──────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python environment ───────────────────────────────
      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: Model_Pipeline/requirements.txt

      - name: Install dependencies
        run: pip install -r Model_Pipeline/requirements.txt

      # ── 3. GCP authentication ────────────────────────────────
      # Skipped gracefully when GCP_SA_KEY_PRATHAM  secret is not configured.
      # gcp_registry.push_after_mlflow_log() already handles auth failures
      # without aborting training, so this gate is an early-exit optimisation.
      - name: Authenticate to GCP
        id: auth
        if: env.GCP_SA_KEY_PRATHAM  != ''
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY_PRATHAM  }}

      - name: Set up gcloud CLI
        if: env.GCP_SA_KEY_PRATHAM  != ''
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Export GCP credentials for DVC
        if: env.GCP_SA_KEY_PRATHAM  != ''
        run: echo "GOOGLE_APPLICATION_CREDENTIALS=${{ steps.auth.outputs.credentials_file_path }}" >> $GITHUB_ENV

      # ── 4. Training data ────────────────────────────────────
      - name: Pull training data (DVC)
        run: |
          pip install gcsfs --quiet
          python3 << 'PYEOF'
          import gcsfs, os
          os.makedirs("Data_Pipeline/data/processed", exist_ok=True)
          fs = gcsfs.GCSFileSystem()
          for f in ["train_split.parquet", "val_split.parquet", "test_split.parquet"]:
              dest = f"Data_Pipeline/data/processed/{f}"
              if not os.path.exists(dest):
                  fs.get(f"ecopulse-aaditya-data/processed/{f}", dest)
                  print(f"Downloaded {f}")
              else:
                  print(f"Already exists: {f}")
          PYEOF


      - name: Verify training data
        run: |
          missing=()
          for f in \
            Data_Pipeline/data/processed/train_split.parquet \
            Data_Pipeline/data/processed/val_split.parquet \
            Data_Pipeline/data/processed/test_split.parquet; do
            [ -f "$f" ] || missing+=("$f")
          done
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing required data files:"
            printf '  %s\n' "${missing[@]}"
            exit 1
          fi
          echo "✅ All training data files present"

      # ── 5. Training ─────────────────────────────────────────
      - name: Run XGBoost training
        working-directory: ${{ env.MODEL_SRC }}
        run: |
          mkdir -p ../../reports
          python train_xgboost.py 2>&1 | tee ../../reports/train_xgboost.log
          # Propagate non-zero exit codes through tee
          exit "${PIPESTATUS[0]}"

      # ── 5. Upload artifacts ─────────────────────────────────
      - name: Upload XGBoost models
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: models-xgboost
          path: Model_Pipeline/models/xgboost_*.joblib
          if-no-files-found: error
          retention-days: 30

      - name: Upload XGBoost reports
        if: always()   # upload even on partial failure for debugging
        uses: actions/upload-artifact@v4
        with:
          name: reports-xgboost
          path: |
            Model_Pipeline/reports/xgboost_results.csv
            Model_Pipeline/reports/xgb_importance_*.csv
            Model_Pipeline/reports/xgboost_*.png
            Model_Pipeline/reports/train_xgboost.log
          if-no-files-found: warn
          retention-days: 14

      - name: Upload MLflow runs (XGBoost)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mlruns-xgboost
          path: Model_Pipeline/mlruns/
          if-no-files-found: ignore
          retention-days: 30

# ================================================================
