electricitymaps:
  base_url: "https://api.electricitymaps.com"
  token: "o3ZjQ0d1U7tC24Ax2E6y" 

ingestion:
  signals:
    - carbon-intensity
    - carbon-free-energy
    - electricity-source
    - electricity-flows
    - electricity-mix
    - electricity-source
    - carbon-intensity-fossil-only
    - net-load
    - renewable-energy
    - total-load
    - total-reported-load

  electricity_sources:
    - nuclear
    - geothermal
    - biomass
    - coal
    - gas
    - oil
    - hydro
    - hydro-discharge
    - wind
    - solar
    - battery-discharge


  zones:
    - US-NW-PACW
    - US-MIDA-PJM

  endpoint_template: "/v3/{signal}/past-range"

  start: "2023-01-01T00:00:00Z"
  end: "2026-01-01T00:00:00Z"
  chunk_days: 10

  static_params:
    temporalGranularity: "hourly"

gcs:
  bucket: "ecopulse"
  raw_prefix: "raw"
