electricitymaps:
  base_url: "https://api.electricitymaps.com"
  token: "o3ZjQ0d1U7tC24Ax2E6y"

ingestion:
  signals:
    - carbon-intensity
    - carbon-free-energy
    - electricity-flows
    - electricity-mix
    - carbon-intensity-fossil-only
    - net-load
    - renewable-energy
    - total-load
    - total-reported-load
  electricity_sources:
    - nuclear
    - geothermal
    - biomass
    - coal
    - gas
    - oil
    - hydro
    - hydro-discharge
    - wind
    - solar
    - battery-discharge
  zones:
    - US-NW-PACW
    - US-MIDA-PJM
  endpoint_template: "/v3/{signal}/past-range"
  electricity_source_template: "/v3/electricity-source/{source}/past-range"
  start: "2024-01-01T00:00:00Z"
  end: "2025-01-01T00:00:00Z"
  chunk_days: 10
  static_params:
    temporalGranularity: "hourly"

gcs:
  bucket: "ecopulse-kapish"
  raw_prefix: "raw"
