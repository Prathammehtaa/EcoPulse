gcs:
  project_id: "ecopulse-mlops-487708"
  bucket: "ecopulse"
  paths:
    raw_grid: "raw/grid_signals"
    raw_weather: "raw/weather"
    processed: "processed"
    features: "features"
    schemas: "schemas"

# ---- Local Data Paths ----
local:
  raw_grid: "data/raw/grid_signals"
  raw_weather: "data/raw/weather"
  processed: "data/processed"
  features: "data/features"
  schemas: "schema_validation/schemas"

# ---- Region Configuration ----
regions:
  - name: "northern_virginia"
    grid_zone: "US-MIDA-PJM"
    weather_folder: "northern_virginia"
    latitude: 39.0465
    longitude: -77.2997
    timezone: "America/New_York"
    cloud_mapping:
      aws: "us-east-1"
      gcp: "us-east4"
      azure: "eastus"

  - name: "portland_oregon"
    grid_zone: "US-NW-PACW"
    weather_folder: "portland_oregon"
    latitude: 45.5234
    longitude: -122.6762
    timezone: "America/Los_Angeles"
    cloud_mapping:
      aws: "us-west-2"
      gcp: "us-west1"
      azure: "westus2"

# ---- Training Window ----
training_window:
  start: "2023-01-01"
  end: "2026-03-19"

# ---- Grid Preprocessing ----
grid:
  priority_signals:
    - "carbon-intensity"
    - "carbon-free-energy"
    - "carbon-intensity-fossil-only"
    - "renewable-energy"
    - "total-load"
    - "net-load"

  value_field_overrides:
    carbon-intensity: "carbonIntensity"

  column_mapping:
    carbon-intensity: "carbon_intensity_gco2_per_kwh"
    carbon-free-energy: "carbon_free_energy_pct"
    carbon-intensity-fossil-only: "carbon_intensity_fossil_gco2_per_kwh"
    renewable-energy: "renewable_energy_pct"
    total-load: "total_load_mw"
    net-load: "net_load_mw"

  value_ranges:
    carbon_intensity_gco2_per_kwh:
      min: 0
      max: 1500
    carbon_free_energy_pct:
      min: 0
      max: 100
    carbon_intensity_fossil_gco2_per_kwh:
      min: 0
      max: 1500
    renewable_energy_pct:
      min: 0
      max: 100
    total_load_mw:
      min: 0
      max: 500000
    net_load_mw:
      min: -50000
      max: 500000

# ---- Weather Preprocessing ----
weather:
  datetime_column: "time"

  selected_features:
    - "temperature_2m"
    - "wind_speed_100m"
    - "cloud_cover"
    - "shortwave_radiation"
    - "rain"
    - "snowfall"
    - "weather_code"

  column_mapping:
    temperature_2m: "temperature_2m_c"
    wind_speed_100m: "wind_speed_100m_ms"
    cloud_cover: "cloud_cover_pct"
    shortwave_radiation: "shortwave_radiation_wm2"
    rain: "rain_mm"
    snowfall: "snowfall_cm"
    weather_code: "weather_code"

  value_ranges:
    temperature_2m_c:
      min: -50
      max: 60
    wind_speed_100m_ms:
      min: 0
      max: 75
    cloud_cover_pct:
      min: 0
      max: 100
    shortwave_radiation_wm2:
      min: 0
      max: 1400
    rain_mm:
      min: 0
      max: 100
    snowfall_cm:
      min: 0
      max: 100
    weather_code:
      min: 0
      max: 99

# ---- Feature Engineering ----
features:
  target_column: "carbon_intensity_gco2_per_kwh"
  lag_hours: [1, 3, 6, 24, 168]
  rolling_windows: [4, 12, 24]

# ---- Output ----
output:
  format: "parquet"
  compression: "snappy"
  files:
    grid_processed: "grid_data_processed.parquet"
    weather_processed: "weather_data_processed.parquet"
    merged: "merged_dataset.parquet"
    feature_table: "feature_table.parquet"

# ---- Logging ----
logging:
  level: "INFO"
  format: "%(asctime)s | %(name)s | %(levelname)s | %(message)s"