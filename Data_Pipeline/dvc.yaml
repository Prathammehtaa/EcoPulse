stages:
  stage_data:
    cmd: python src/stage_data.py
    deps:
      - src/stage_data.py
      - config/ingestion_config.yaml
    outs:
      - data/stage/grid_signals_all_zones.parquet
      - data/stage/weather_all_locations.parquet

  bias_analysis:
    cmd: python src/tfdv_bias_analysis.py
    deps:
      - src/tfdv_bias_analysis.py
      - data/stage/grid_signals_all_zones.parquet
    outs:
      - reports/tfdv_bias/distribution_carbon_intensity_bucket.csv
      - reports/tfdv_bias/distribution_hour_of_day.csv
      - reports/tfdv_bias/tfdv_bias_report.md

  bias_visualization:
    cmd: python src/bias_visualization.py
    deps:
      - src/bias_visualization.py
      - reports/tfdv_bias/distribution_carbon_intensity_bucket.csv
    outs:
      - reports/tfdv_bias/bias_summary.json
    plots:
      - reports/tfdv_bias/plots/

  bias_mitigation:
    cmd: python src/bias_mitigation.py
    deps:
      - src/bias_mitigation.py
      - data/stage/grid_signals_all_zones.parquet
    outs:
      - data/processed/train_balanced.csv
      - data/processed/val_balanced.csv
      - data/processed/test_balanced.csv
      - reports/bias_mitigation/mitigation_report.json