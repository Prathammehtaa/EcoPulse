stages:
  preprocessing:
    cmd: python src/grid_preprocessing.py && python src/weather_preprocessing.py
    deps:
      - src/grid_preprocessing.py
      - src/weather_preprocessing.py
      - config/preprocessing_config.yaml
      - data/raw/grid_signals/backfill/
      - data/raw/weather/backfill/
    outs:
      - data/processed/grid_data_processed.parquet
      - data/processed/weather_data_processed.parquet

  merge:
    cmd: python src/merge_and_features.py
    deps:
      - src/merge_and_features.py
      - data/processed/grid_data_processed.parquet
      - data/processed/weather_data_processed.parquet
    outs:
      - data/processed/merged_dataset.parquet

  feature_engineering:
    cmd: python src/feature_engineering.py
    deps:
      - src/feature_engineering.py
      - data/processed/merged_dataset.parquet
    outs:
      - data/features/feature_table.parquet

  label_split:
    cmd: python src/label_temporal_split.py
    deps:
      - src/label_temporal_split.py
      - data/features/feature_table.parquet
    outs:
      - data/processed/model_ready.parquet

  bias_analysis:
    cmd: python src/tfdv_bias_analysis.py
    deps:
      - src/tfdv_bias_analysis.py
      - data/features/feature_table.parquet
    outs:
      - reports/tfdv_bias/distribution_carbon_intensity_bucket.csv
      - reports/tfdv_bias/distribution_hour_of_day.csv
      - reports/tfdv_bias/tfdv_bias_report.md
    plots:
      - reports/tfdv_bias/plots/carbon_intensity_bucket_distribution.png

  bias_mitigation:
    cmd: python src/bias_mitigation.py
    deps:
      - src/bias_mitigation.py
      - data/features/feature_table.parquet
    outs:
      - data/processed/train_balanced.parquet
      - data/processed/val_balanced.paruet
      - data/processed/test_balanced.parquet
      - reports/bias_mitigation/mitigation_report.json