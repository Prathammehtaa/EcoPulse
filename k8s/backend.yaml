---
apiVersion: v1
kind: Namespace
metadata:
  name: ecopulse

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: ecopulse
  labels:
    app: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: us-central1-docker.pkg.dev/ecopulse-492814/ecopulse-images/backend:latest
          ports:
            - containerPort: 8000
          env:
            - name: GCS_BUCKET
              value: "ecopulse-lakehouse"
            - name: MODELS_GCS_PREFIX
              value: "models"
            - name: DATA_GCS_PREFIX
              value: "processed"
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: ecopulse
spec:
  selector:
    app: backend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
  type: LoadBalancer